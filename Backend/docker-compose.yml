services:
  indexdb:
    container_name: thehive_database
    image: surrealdb/surrealdb:latest
    ports:
      - '8000:8000'
    volumes:
      - shared-data:/data
    command: start --bind 0.0.0.0:8000 --user ${dbRootUser} --pass ${dbRootPass} surrealkv:///data/AppFiles/surreal.db
    networks:
      - thehive_network

  aiserver:
    container_name: thehive
    image: thehive
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    ports:
      - '3000:3000'
    depends_on:
      - indexdb
      - n8n
      - ollama
    volumes:
      - shared-data:/data
    networks:
      - thehive_network

  n8n:
    container_name: thehive_n8n
    image: n8nio/n8n:latest
    ports:
      - '5678:5678'
    environment:
      - N8N_USER_FOLDER=/data/AppFiles/n8n_data
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - shared-data:/data
    networks:
      - thehive_network

  ollama:
    container_name: thehive_ollama
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - thehive_network
    # Note - below is just for Nvidia GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  shared-data:
    driver: local
    driver_opts:
      type: none
      device: ${knowledgebaseHostURL}
      o: bind
  ollama_models:

networks:
  thehive_network:
    driver: bridge
